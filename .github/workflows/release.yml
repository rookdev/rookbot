# workflow name
name: On Release Deployment

# fire on
on:
  release:
    types: [published, prereleased, released]

#########
# actions
#########
# actions/checkout@v6.0.2
# actions/setup-python@v6.2.0

# stuff to do
jobs:
  # Get Release Info
  # Send Discord notification
  discord-notify:
    # VM settings
    #  os & python versions
    strategy:
      matrix:
        os-name: [ ubuntu-latest ]
        python-version: [ "3.13" ]

    name: Notify Discord of new Release
    runs-on: ${{ matrix.os-name }}
    steps:
      # checkout commit
      - name: ✔️Checkout commit
        uses: actions/checkout@v6.0.2
      # install python
      - name: 💿Install python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          architecture: "x64"
      - run: |
          python --version
      # install dependencies via pip
      - name: 💿Install Dependencies via pip
        run: |
          python -m pip install pytz requests
      - name: Build Discord Notification Payload
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_RELEASES }}
        run: |
          python ./resources/ci/common/prepare_discord_notif.py
        if: (github.ref == 'refs/heads/main') || (github.ref == 'refs/heads/stable')
